# .github/workflows/build.yml
# DPISwitch — автоматическая сборка unsigned IPA
# Запускается при push в master/main или вручную

name: Build IPA

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Выбираем последний доступный Xcode
      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      # Устанавливаем xcodegen
      - name: Install xcodegen
        run: brew install xcodegen

      # Генерируем .xcodeproj
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          ls -la *.xcodeproj || echo "No xcodeproj found!"

      # Кеш SPM
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .spm-cache
          key: spm-${{ hashFiles('project.yml') }}

      # Разрешаем зависимости SPM
      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DPISwitch.xcodeproj \
            -scheme DPISwitch \
            -clonedSourcePackagesDirPath .spm-cache

      # Собираем (без подписи)
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project DPISwitch.xcodeproj \
            -scheme DPISwitch \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath "${{ runner.temp }}/DerivedData" \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tee "${{ runner.temp }}/build.log"

      # Находим .app и упаковываем в IPA
      - name: Package IPA
        run: |
          echo "=== Searching for .app ==="
          find "${{ runner.temp }}/DerivedData" -name "*.app" -type d 2>/dev/null

          APP_PATH=$(find "${{ runner.temp }}/DerivedData" \
            -name "DPISwitch.app" -type d \
            -not -path "*/Index.noindex/*" \
            | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: DPISwitch.app not found"
            echo "=== DerivedData tree ==="
            find "${{ runner.temp }}/DerivedData" -maxdepth 6 -type d | head -40
            exit 1
          fi

          echo "Found: $APP_PATH"

          mkdir -p "${{ runner.temp }}/Payload"
          cp -r "$APP_PATH" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r DPISwitch.ipa Payload
          ls -lh DPISwitch.ipa
          echo "IPA created successfully!"

      # Загружаем IPA как артефакт (хранится 30 дней)
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DPISwitch-unsigned
          path: ${{ runner.temp }}/DPISwitch.ipa
          retention-days: 30

      # При ошибке — показываем конец лога
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== Last 100 lines of build log ==="
          tail -100 "${{ runner.temp }}/build.log" 2>/dev/null || echo "No log file"

      - name: Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- iOS target: 17.0+" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install via AltStore" >> $GITHUB_STEP_SUMMARY
          echo "Download IPA from Artifacts above and install with AltStore." >> $GITHUB_STEP_SUMMARY
