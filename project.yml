# project.yml — xcodegen spec для DPISwitch
# Генерация: xcodegen generate

name: DPISwitch

options:
  bundleIdPrefix: com.dpiswitch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  SwByeDPI:
    url: https://github.com/mIwr/SwByeDPI
    from: "0.17.3"

targets:
  DPISwitch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: DPISwitch

    info:
      path: DPISwitch/Info.plist
      properties:
        CFBundleDisplayName: "DPI Switch"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        NSLocalNetworkUsageDescription: "DPI Switch needs local network to run a SOCKS5 proxy."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dpiswitch.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_BITCODE: NO
        ENABLE_PREVIEWS: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""

    dependencies:
      - package: SwByeDPI
        product: SwByeDPI
      - package: SwByeDPI
        product: ByeDPIKit
