# project.yml
# DPISwitch — xcodegen spec
# Генерирует Xcode project: `xcodegen generate`
# Docs: https://github.com/yonaskolb/XcodeGen

name: DPISwitch

options:
  bundleIdPrefix: com.dpiswitch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

packages:
  SwByeDPI:
    url: https://github.com/mIwr/SwByeDPI
    from: "0.17.3"

targets:
  DPISwitch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # Все Swift файлы рекурсивно из папки DPISwitch/
    sources:
      - path: DPISwitch
        excludes:
          - "**/*.plist"
          - "Info.plist"
          - "Resources/Assets.xcassets"
        type: group
      # Assets отдельно (ресурсы)
      - path: DPISwitch/Resources/Assets.xcassets

    # Info.plist
    info:
      path: DPISwitch/Info.plist
      properties:
        CFBundleDisplayName: "DPI Switch"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: "DPI Switch uses local network access to run a SOCKS5 proxy server for DPI bypass."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

    # Настройки сборки
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dpiswitch.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_BITCODE: NO
        VALIDATE_PRODUCT: YES
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: YES
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
        Release:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""

    # SPM зависимости
    dependencies:
      - package: SwByeDPI
        product: SwByeDPI
      - package: SwByeDPI
        product: ByeDPIKit

    # Фазы сборки
    preBuildScripts:
      - name: "SwiftLint (optional)"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint --quiet
          fi
        basedOnDependencyAnalysis: false
        showEnvVars: false
